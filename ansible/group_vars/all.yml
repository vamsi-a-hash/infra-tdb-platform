---
# Shared non-secret variables for all environments.
service_user: talkingdb
service_group: talkingdb
deploy_base_dir: /opt/talkingdb
docker_network_name: talkingdb-net

# Compose project directory on the VM (runtime_config + deploy_services write here).
compose_dir: "{{ deploy_base_dir }}/compose"

# Traefik image (non-secret, shared across environments).
traefik_image: traefik:v3.6.4

# TLS via Let's Encrypt is enabled in all deployed environments.
traefik_tls_enabled: true
traefik_acme_email: mayank.g@smarter.codes

# Container registry (non-secret). Credentials are injected by the secrets role.
docker_registry: docker.io

# module-ttt image (deploy_services). The pipeline overrides the tag with the
# git SHA per release; latest is only a local/standalone fallback.
module_ttt_image: talkingdb/ttt
module_ttt_image_tag: latest

# DVC remote for the graphs.db dataset (module-ttt's remote; non-secret).
# S3 credentials are injected at deploy time, not stored here.
dvc_remote_name: storage
dvc_remote_url: s3://ttt
dvc_remote_endpoint: https://data.talkingdb.io

# Infisical workspace holding runtime secrets (non-secret identifier).
infisical_workspace_id: a8820fc7-b5cc-45df-9e6a-bcd431fa59a3

tdb_services:
  module_ttt:
    port: 8090
  content_elementizer:
    port: 8091
