---
docker_host_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_host_apt_gpg_url: https://download.docker.com/linux/ubuntu/gpg
docker_host_apt_repo_uri: https://download.docker.com/linux/ubuntu
docker_host_apt_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

docker_host_network_driver: bridge

# Daemon config — log rotation so container logs don't fill the disk.
docker_host_daemon_options:
  log-driver: json-file
  log-opts:
    max-size: "10m"
    max-file: "3"
