---
# Fetch runtime secrets from Infisical and render an env_file for the
# containers. Skips cleanly when no machine-identity credentials are provided.

- name: Check whether the Infisical CLI is installed
  ansible.builtin.command: infisical --version
  register: secrets_cli_check
  changed_when: false
  failed_when: false
  check_mode: false
  tags: [secrets]

- name: Add the Infisical apt repository
  ansible.builtin.shell: |
    set -o pipefail
    curl -1sLf 'https://artifacts-cli.infisical.com/setup.deb.sh' | bash
  args:
    executable: /bin/bash
  become: true
  changed_when: true
  when: secrets_cli_check.rc != 0
  tags: [secrets]

- name: Install the Infisical CLI
  ansible.builtin.apt:
    name: "infisical{{ ('=' ~ secrets_infisical_version) if (secrets_infisical_version | length > 0) else '' }}"
    state: present
    update_cache: true
  become: true
  when: secrets_cli_check.rc != 0
  tags: [secrets]

- name: Authenticate to Infisical with the machine identity
  ansible.builtin.command: infisical login --method=universal-auth --plain --silent
  environment:
    INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ infisical_machine_client_id }}"
    INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ infisical_machine_client_secret }}"
  register: secrets_login
  changed_when: false
  no_log: true
  when:
    - infisical_machine_client_id | default('') | length > 0
    - infisical_machine_client_secret | default('') | length > 0
  tags: [secrets]

- name: Export secrets from Infisical
  ansible.builtin.command: >-
    infisical export
    --projectId={{ infisical_workspace_id }}
    --env={{ env_name }}
    --format=dotenv
  environment:
    INFISICAL_TOKEN: "{{ secrets_login.stdout | default('') }}"
  register: secrets_export
  changed_when: false
  no_log: true
  when: (secrets_login.stdout | default('')) | length > 0
  tags: [secrets]

- name: Render the env_file
  ansible.builtin.copy:
    content: "{{ secrets_export.stdout }}\n"
    dest: "{{ secrets_env_file }}"
    owner: "{{ service_user }}"
    group: "{{ service_group }}"
    mode: "0600"
  become: true
  no_log: true
  when: (secrets_export.stdout | default('')) | length > 0
  tags: [secrets]
